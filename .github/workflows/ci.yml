name: CI

on:
  pull_request:
    # Organization Actions minutes are billed. Keep remote CI opt-in:
    # - run it manually with workflow_dispatch; or
    # - add the `run-ci` / `full-ci` PR label when a remote matrix is needed.
    # It does not run on push, tag push, PR open, PR synchronize, or ready_for_review.
    types: [labeled]
    branches:
      - main
    paths:
      - ".github/workflows/ci.yml"
      - "examples/**"
      - "package-lock.json"
      - "package.json"
      - "scripts/**"
      - "src/**"
      - "test/**"
      - "tsconfig.json"
  # Deliberately no push trigger. Organization Actions minutes are billed, so
  # branch pushes and alpha/release tag pushes rely on local gates by default.
  # Use workflow_dispatch when remote CI is explicitly needed.
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Node ${{ matrix.node-version }} / ${{ matrix.os }}
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (
          github.event_name == 'pull_request' &&
          github.event.action == 'labeled' &&
          (github.event.label.name == 'run-ci' || github.event.label.name == 'full-ci')
        )
      }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        node-version:
          - "20.19"
          - "24"
        exclude:
          # better-sqlite3 currently lacks a stable Windows Node 20.19 prebuild on
          # GitHub-hosted runners, so the job falls back to node-gyp/VS detection.
          - os: windows-latest
            node-version: "20.19"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install
        run: npm ci

      - name: PR gate
        run: npm run gate:pr
