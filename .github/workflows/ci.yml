name: CI

on:
  pull_request:
    # Do not run on every commit pushed to an open PR. Organization Actions
    # minutes are billed, so routine iteration should rely on local gates and
    # explicit workflow_dispatch re-runs when remote CI is needed.
    types: [opened, reopened, ready_for_review]
    branches:
      - main
    paths:
      - ".github/workflows/ci.yml"
      - "examples/**"
      - "package-lock.json"
      - "package.json"
      - "scripts/**"
      - "src/**"
      - "test/**"
      - "tsconfig.json"
  push:
    # Routine branch pushes are intentionally excluded to avoid billed CI runs.
    # Use pull requests, manual workflow_dispatch, or v* release tags when CI is needed.
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Node ${{ matrix.node-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        node-version:
          - "20.19"
          - "24"
        exclude:
          # better-sqlite3 currently lacks a stable Windows Node 20.19 prebuild on
          # GitHub-hosted runners, so the job falls back to node-gyp/VS detection.
          - os: windows-latest
            node-version: "20.19"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install
        run: npm ci

      - name: PR gate
        run: npm run gate:pr
